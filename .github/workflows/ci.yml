name: CI
on:
  push: { branches: [main] }
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.22' }
      - working-directory: cli
        run: |
          go mod download
          go vet ./...
          go test -race -count=1 ./...
          go build ./...
