name: ios-swift
display_name: "iOS / Swift (UIKit + SwiftUI + AppKit)"
version: 0.1.0
loop_template: dev-pipeline
requires_base: ">= 0.1.0"
roles:
  - architect
  - implementer
  - tester
  - bug-hunter
  - refactor-agent
  - explorer
  - reviewer
tool_agents:
  - xcode-runner
  - spm-manager
  - simulator-driver
  - testflight-shipper
  - xcodegen-driver
  - swiftlint-checker

gitignore:
  - .build/
  - .swiftpm/
  - "*.xcodeproj/"
  - "*.xcworkspace/"
  - DerivedData/
  - xcuserdata/
  - "*.xcuserstate"
  - "*.hmap"
  - "*.ipa"
  - "*.dSYM.zip"
  - "*.dSYM"

executing:
  implementer: "*.swift under Sources/**, Tests/**"
  tester: "XCTest / swift-testing files under Tests/**"
  xcodegen-driver: "project.yml + xcodegen generate; owns .xcodeproj shape"
  spm-manager: "Package.swift, Package.resolved"
  xcode-runner: "xcodebuild build/test invocations"
  swiftlint-checker: ".swiftlint.yml + swiftlint runs"
