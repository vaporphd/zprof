name: systems-rust
detect:
  any_file:
    - "Cargo.toml"
    - "Cargo.lock"
    - "rust-toolchain.toml"
    - "rust-toolchain"
    - "rustfmt.toml"
    - ".rustfmt.toml"
    - "clippy.toml"
  any_regex:
    - path: "Cargo.toml"
      match: "\\[package\\]|\\[workspace\\]|edition\\s*=\\s*\"20"
    - path: "**/*.rs"
      match: "^use |^fn |^pub|^struct|^impl|^mod|^trait"
  confidence: high
