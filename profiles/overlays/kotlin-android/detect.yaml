name: kotlin-android
detect:
  any_file:
    - "build.gradle.kts"
    - "settings.gradle.kts"
    - "gradle/libs.versions.toml"
    - "app/src/main/AndroidManifest.xml"
    - "AndroidManifest.xml"
    - "gradle.properties"
  any_regex:
    - path: "settings.gradle.kts"
      match: "com\\.android\\.application|com\\.android\\.library"
    - path: "build.gradle.kts"
      match: "kotlin\\(\"android\"\\)|id\\(\"com\\.android\\.application\"\\)"
    - path: "gradle/libs.versions.toml"
      match: "android|compose"
  confidence: high
