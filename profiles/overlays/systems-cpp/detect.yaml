name: systems-cpp
detect:
  any_file:
    - "CMakeLists.txt"
    - "CMakePresets.json"
    - "Makefile"
    - "conanfile.txt"
    - "conanfile.py"
    - "vcpkg.json"
    - "meson.build"
    - "BUILD"
    - "BUILD.bazel"
    - "*.pro"
  any_regex:
    - path: "CMakeLists.txt"
      match: "CXX|CMAKE_CXX_STANDARD|add_library|add_executable|project\\("
    - path: "conanfile.py"
      match: "class .*ConanFile"
  confidence: high
